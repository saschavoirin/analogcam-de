name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Astro and TypeScript check
        run: npm run astro:check

      - name: Validate photos and metadata
        run: npm run photos:validate

      - name: Build
        run: npm run build

      - name: Size check
        run: npm run size:check
